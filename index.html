<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>moonlight.cc</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0f0f12;
  --bg-secondary: #16161d;
  --bg-tertiary: #1c1c24;
  --border: #272730;
  --border-hover: #3a3a48;
  --text-primary: #f0f0f5;
  --text-secondary: #a0a0b0;
  --text-tertiary: #6b6b7b;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-purple: #8b5cf6;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --accent-pink: #ec4899;
  --glow-blue: 0 0 20px rgba(59, 130, 246, 0.15);
  --glow-green: 0 0 20px rgba(16, 185, 129, 0.15);
  --glow-amber: 0 0 20px rgba(245, 158, 11, 0.15);
  --glow-red: 0 0 20px rgba(239, 68, 68, 0.15);
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(ellipse at 15% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 48px;
  background: rgba(15, 15, 18, 0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 50%, var(--accent-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stats {
  display: flex;
  gap: 32px;
}

.stat {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.stat-label {
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 48px;
  position: relative;
  z-index: 1;
}

.terminal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 32px;
  padding: 24px;
  height: 200px;
  overflow-y: auto;
  font-size: 13px;
  font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
  color: var(--text-secondary);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.terminal::-webkit-scrollbar {
  width: 6px;
}

.terminal::-webkit-scrollbar-track {
  background: transparent;
}

.terminal::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.line {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s ease;
}

.line:hover {
  color: var(--text-primary);
  padding-left: 8px;
}

.line::before {
  content: '›';
  color: var(--accent-cyan);
  font-weight: 700;
  font-size: 14px;
}

.line:last-child {
  border-bottom: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

.type {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.type::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 2px;
  background: currentColor;
}

.title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 12px;
}

.desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-line;
  margin-bottom: 16px;
}

.time {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: center;
  gap: 6px;
}

.time::before {
  content: '◷';
  font-size: 10px;
}

.sev-high {
  border-left: 3px solid var(--accent-red);
  background: linear-gradient(90deg, rgba(239, 68, 68, 0.06) 0%, transparent 40%);
}

.sev-high:hover {
  border-color: var(--accent-red);
  box-shadow: var(--glow-red), 0 12px 40px rgba(0, 0, 0, 0.4);
}

.sev-high .type {
  color: var(--accent-red);
}

.sev-mid {
  border-left: 3px solid var(--accent-amber);
  background: linear-gradient(90deg, rgba(245, 158, 11, 0.06) 0%, transparent 40%);
}

.sev-mid:hover {
  border-color: var(--accent-amber);
  box-shadow: var(--glow-amber), 0 12px 40px rgba(0, 0, 0, 0.4);
}

.sev-mid .type {
  color: var(--accent-amber);
}

.sev-low {
  border-left: 3px solid var(--accent-green);
  background: linear-gradient(90deg, rgba(16, 185, 129, 0.06) 0%, transparent 40%);
}

.sev-low:hover {
  border-color: var(--accent-green);
  box-shadow: var(--glow-green), 0 12px 40px rgba(0, 0, 0, 0.4);
}

.sev-low .type {
  color: var(--accent-green);
}

@media (max-width: 768px) {
  header {
    padding: 24px 24px;
    flex-direction: column;
    gap: 20px;
  }
  
  .container {
    padding: 24px;
  }
  
  .grid {
    grid-template-columns: 1fr;
  }
  
  .stats {
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
}
</style>
</head>
<body>
<header>
  <div class="logo">moonlight.cc</div>
  <div class="stats">
    <div class="stat">
      <span class="status-dot"></span>
      <span class="stat-label">Events</span>
      <span class="stat-value" id="count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Last Update</span>
      <span class="stat-value" id="last">waiting</span>
    </div>
  </div>
</header>
<div class="container">
  <div class="terminal" id="terminal"></div>
  <div class="grid" id="grid"></div>
</div>
<script>
let lastHash = ""
async function load() {
  let res = await fetch("updates.json?" + Date.now())
  let data = await res.json()
  let hash = JSON.stringify(data)
  if (hash === lastHash) return
  lastHash = hash
  document.getElementById("count").innerText = data.length
  if (data.length) {
    document.getElementById("last").innerText = new Date(data[data.length - 1].time).toLocaleTimeString()
  }
  let grid = document.getElementById("grid")
  let terminal = document.getElementById("terminal")
  grid.innerHTML = ""
  terminal.innerHTML = ""
  data.reverse().forEach(e => {
    let card = document.createElement("div")
    card.className = "card sev-" + (e.severity || "low")
    card.innerHTML = `
      <div class="type">${e.type}</div>
      <div class="title">${e.title}</div>
      <div class="desc">${e.description}</div>
      <div class="time">${new Date(e.time).toLocaleString()}</div>
    `
    grid.appendChild(card)
    let line = document.createElement("div")
    line.className = "line"
    line.innerText = "[" + e.type + "] " + e.title
    terminal.appendChild(line)
  })
}
load()
setInterval(load, 5000)
</script>
</body>
</html>
